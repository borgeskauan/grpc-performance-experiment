syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.product.grpc";
option java_outer_classname = "ProductProto";

package product;

// Product Service with server streaming endpoints
service ProductService {
  // Streams all products from the catalog
  rpc StreamProducts(ProductStreamRequest) returns (stream ProductResponse);
  
  // Streams real-time stock updates for watched products
  rpc WatchStock(StockWatchRequest) returns (stream StockUpdate);
}

// Request to stream products
message ProductStreamRequest {
  string category = 1;  // Optional: filter by category (empty = all)
  int32 limit = 2;      // Optional: max products to stream (0 = all)
}

// Product information
message ProductResponse {
  string product_id = 1;
  string name = 2;
  double price = 3;
  int32 stock_quantity = 4;
  string category = 5;
}

// Request to watch stock updates
message StockWatchRequest {
  repeated string product_ids = 1;  // List of product IDs to monitor
}

// Stock update notification
message StockUpdate {
  string product_id = 1;
  int32 stock_quantity = 2;
  int64 timestamp = 3;  // Unix timestamp in milliseconds
  string change_reason = 4;  // e.g., "SALE", "RESTOCK", "ADJUSTMENT"
}
